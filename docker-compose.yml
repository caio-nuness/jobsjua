services:
  web:
    build: .
    ports:
      - "8000:8000"
   
    environment:
      - POSTGRES_NAME=POSTGRES_NAME_DB
      - POSTGRES_USER=POSTGRES_USER_DB
      - POSTGRES_PASSWORD=POSTGRES_PASSWORD_DB
      - POSTGRES_HOST=POSTGRES_HOST_DB

    depends_on:
          - db

    env_file:
      - .env
    command: gunicorn --bind 0.0.0.0:8000 core.wsgi 
    volumes:
      - ./static:/app/static
      - static:/app/static  

  db:
    image: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=POSTGRES_NAME_DB
      - POSTGRES_USER=POSTGRES_USER_DB
      - POSTGRES_PASSWORD=POSTGRES_PASSWORD_DB
    volumes:  
      - db_data:/var/lib/postgresql/data
volumes:
    db_data:
    